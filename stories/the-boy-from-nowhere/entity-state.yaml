        skills_learned: ["Malinga 40% slower ball variation — seam angle grip", "Seam visibility from run-up in bright light — systematic exploitation"]
        india_selection: "Selector watched. Rao says 'keep doing what you're doing.' Not announced but real."
        new_object_drawer: ["match ball 3-22 spell", "team photo (back row, not smiling)", "Emirates boarding pass EK512 April 9 2009"]
        photograph_status: "RECEIVED. Unknown couple, man with his jaw. Sent by unknown. In drawer. Hand shook for 10 minutes. No one told."
        emotional_state: "South Africa = relief from narrative. Home = recognition not relief. Photograph = unknown state (hand shook)."
        catastrophizing_note: "India cap not said aloud. 'Making it real before it was real was the method he used to not have things.' Distortion actively managed."
      rao:
        last_interaction: "Selector call. 'Keep doing what you're doing.' Shivaji Park return: Q&A session, 'You're always knowing things. This time, do them.'"
      new_character:
