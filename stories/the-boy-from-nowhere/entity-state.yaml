  chapter-14:
    title: "New Money"
    timeline: "May–June 2008 (age 18) — post-IPL Season 1"
    events:
      - "IPL Season 1 ends. Rajasthan Royals win (Shane Warne). MI don't make final. Vipin final stats: 8 matches, 234 runs at SR 148, 9 wickets at economy 7.2. Top-5 combined debutant."
      - "First bank statement arrives. Paper form. Number larger than pandit's lifetime earnings, Bhai's best month, groundskeeper's decade pay. Hand in 'precursor to trembling.' Catastrophizing: 'filed under: temporary. Not a permanent condition.' Doesn't engage."
      - "Vipin buys Rao a top-of-the-line SG bat in cloth case. Carries it on the bus. Gives it at Shivaji Park: 'For the nets.' Rao runs thumb along shoulder, glasses slip, doesn't fix them. 'Good willow.' Walks back to nets. Both walk away before moment gets bigger."
      - "Bhai appears outside MI hotel. Same Bhai — older, heavier, flat eyes, clean kurta (dressed for this). They walk on neutral streets. Bhai congratulates him on season, article. Then: 'opportunity' — a club in South Mumbai, music venue, needs investor and face. Nothing illegal technically."
      - "Vipin's two-part internal conflict: street kid (owes Bhai, fed and protected him) vs. cricketer (sees the trap — one piece of paper leads to another). Lets Bhai finish. 'I can't, Bhai. Quiet. No joke.'"
      - "Bhai: 'I'm not asking for much. Just your name.' Pause (smokes). 'On a piece of paper. You don't need to do anything.' Vipin: 'I know what it means to put my name on something now. That's why I can't.'"
      - "Bhai: 'Remember, Chaudhary. I knew you before anyone knew your name. Don't forget the people who were there before the money.' SECOND ASSERTION OF CLAIM (Ch4 = first). Vipin: 'I remember. I don't forget.' Walks back to hotel."
      - "Hotel lobby: staff asks if he needs anything. Vipin snaps ('No' — too sharp). Walks three steps. Returns. Awkward apology: 'Sorry. That was — sorry. I had a hard afternoon. Not your fault.' Staff: 'No problem, sir.' Polite professional equanimity. Moment worse than if he hadn't apologized. Carries it for days."
      - "Endorsement meetings: 5 sessions in BKC. Signs 2 deals (sports drink, clothing). Declines protein supplement (won't say he uses it — doesn't) and insurance company (resilience-narrative framing)."
      - "Ad shoot in Andheri studio: told to look 'fierce but approachable.' Counts 32 light bulbs in makeup room. Photographer spends hour trying to get natural smile. Final photo acceptable, eyes flat."
      - "Deepak the lighting assistant: same age, working-class Mumbai. Praises IPL innings, shows YouTube grip modification for off-spin. Vipin analyzes it technically ('you'd lose carry — ball would skid through'). Gets Deepak's number from production coordinator. Never calls it. Remembers the name: Deepak."
      - "Returns to Shivaji Park end of month. Bus (14 stops). Storage room: cot, linseed oil, 23 cracks in ceiling. Unchanged."
      - "Puts money envelope on groundskeeper's table. Groundskeeper shakes head, pushes it back. 'Tere paisa nahi chahiye. Tu kuch bana, woh kaafi hai.' Vipin: 'Please, uncle.' Groundskeeper takes it, doesn't count, pockets it, buttons pocket, pats it once. Goes back to pitch. 'Khana khaya?' / 'Haan, uncle.' / 'Good.' Sits in storage room an hour."
      - "Discovers R.S. 1987 scratched in concrete behind cot headboard. Old letters, faded. Traces them with fingertip. Hopes R.S. made it. No way to know."
      - "ATM receipt from hotel lobby machine added to wallet. To be placed in drawer. Collection now 6 items: newspaper clipping, 'I want them to say my name' paper, MI practice ball, first-wicket match ball, anonymous letter, ATM receipt."
    state_changes:
