  chapter-09:
    title: "The Price of a Name"
    timeline: "Late November 2007 – February 20, 2008 (age 17)"
    events:
      - "IPL registration officially confirmed. Vipin Chaudhary in player pool. Base price: $30,000. Ravi calls with news — Vipin responds with flat 'Haan'. Ravi teases him about it."
      - "Registration form: passport photo taken at Dadar studio, 45 rupees. Borrowed collared shirt. Jaw set. Emergency contact: Rao's name and number. 'Next of Kin: Blank.'"
      - "Waiting period: longest weeks of his life. Time was never abstract before — always event-based. Now: one fixed date, nothing actionable between now and then."
      - "Catastrophizing begins: what if nobody bids, what if 'Father Unknown, Mother Unknown' triggers committee risk calculations."
      - "Trains obsessively. Two and a half hours at MCA bowling machine alone in December. Operator asks him to leave at close."
      - "Hasn't returned to Dongri since October. Thinks about Bhai's parting claim — 'remember who was here' — as ticking debt."
      - "Late January: stops sleeping properly. Waking 3-4 AM. Counting sounds — groundskeeper's cough (irregular), distant trains (~12 min gaps)."
      - "Rao takes him to Shivaji Park dawn bench. No training. Chai. Watching park wake up. 'The game doesn't know about auctions. The game just knows what you do with the ball.' Works for six hours."
      - "Temple visit: different temple, not the Matunga one. Old woman chanting — cadence identical to pandit's dawn chanting. Vipin's hands tremble. Marigold placed at shrine edge. Walks out without touching pendant. Does not return."
      - "Considered returning two Sundays later. Got on a bus. Got off two stops early. Walked to Shivaji Park instead along the bakery road. Unresolved."
      - "Night before (Feb 19): writes one sentence on torn scorebook paper: 'I want them to say my name.' Folds under pillow."
      - "2:30 AM: walks to Shivaji Park pitch. Taps three times at crease. Plays imaginary cover drive. Returns to storage room. Counting stops. Just waits."
      - "Feb 20 morning: reads sentence, folds it into shirt pocket. White shirt — Rao's tournament gift. Cleaned carefully each time."
      - "Morning drive: Maruti smells of spilled chai. Rao hums to old radio song without noticing. Signal on Senapati Bapat Marg — street kid selling newspapers. Eye contact through glass. Signal changes. Kid turns away. Vipin touches the folded paper."
      - "MCA office: green-tinted TV, 6 people, cold samosas nobody ate. Counted ceiling tiles: 34 (same room as registration challenge — same count as before)."
      - "Ravi sold during afternoon session. Vipin happy for him. Knot tightens."
      - "Auction call: Lot 47, Vipin Chaudhary, $30,000 base. Mumbai Indians bid first. Rajasthan enters. Delhi Daredevils enters. MI jump bid $100,000. Delhi drops. Rajasthan drops. SOLD to Mumbai Indians at $100,000."
      - "Ten seconds of complete stillness. No tears. No joke. First time rubber ball not squeezed in six hours."
      - "Aftermath: Rao parks at Shivaji Park. 'I don't know what to do now.' / 'Training camp starts in three weeks. You play cricket. That's all it's been.'"
      - "Page 12 of evening newspaper: 'Vipin Chaudhary — MI.' Cut out. Folded inside the 'I want them to say my name' paper. Both in the drawer."
      - "Groundskeeper's radio: auction roundup mentions Vipin. Groundskeeper turns it off. One knock on Vipin's wall. Vipin knocks back. Nothing else said."
      - "Sleeps. First real sleep in weeks."
    state_changes:
      vipin:
        age: 17
        ipl_status: "SOLD — Mumbai Indians, $100,000 USD (~38.2 lakh rupees)"
        emotional_state: "Shock/stillness → quiet reckoning → first real sleep"
        objects_updated: "Paper ('I want them to say my name') now in drawer with newspaper clipping"
        sleep: "Resumes after auction sold call. Counted 5 people in 17 years: pandit, bhai, rao, keshav, ravi."
      ravi:
        ipl_status: "SOLD — team not specified, modest bid. Ecstatic."
      rao:
        action: "Arranged dawn bench session. Drove Vipin to MCA. Parked at Shivaji Park after. 'Training camp. Play cricket.' — most essential Rao distillation."
    threads_developed:
      - the_paper (PLANTED — 'I want them to say my name'. In drawer Ch 10. Deepest vulnerability in Act 1.)
      - bhai_claim (ACTIVE — Vipin hasn't told Bhai. Debt ticking. IPL contract makes it larger.)
      - mystery_woman (DORMANT — not referenced this chapter)
      - ipl_incoming (RESOLVED — Sold. Mumbai Indians. $100,000. Act 1 climax delivered.)
      - groundskeeper_bond (PAYOFF MOMENT — one knock through wall. The silent man's most articulate gesture.)
    anti_ai_markers_verified:
      strange_personal_detail: "2:30 AM walk to Shivaji Park. Imaginary cover drive at the crease in the dark. Plays the shot to an imaginary crowd. Returns to bed. Nobody sees it."
      imperfect_moment: "Temple visit — hands shake when old woman's chanting cadence matches pandit's. Leaves without praying, without touching pendant. Gets on bus to return two weeks later, gets off early, doesn't go back. Unresolved."
      unresolved_micro: "Street kid selling newspapers at signal. Eye contact through Maruti window. Signal changes. Kid turns to next car. Vipin touches folded paper. Nothing more."
      grounding_physical: "Dal skin forming — seven ripples counted. Registration photo: borrowed shirt, 45-rupee studio, man with world-weariness, 'theek hai, done.'"
    inconsistencies_detected:
      - "Outline said base price $30,000 but also mentioned $60,000 recommendation from scout Prashant in Ch08. Resolved: scout recommended $60,000 to MI so they'd have bidding room; auction base price set at $30,000 (minimum tier). Consistent."

  chapter-08:
    title: "The Wrong Side of the Rope"
    timeline: "2006-2007 (ages 16-17)"
    events:
      - "Ranji Trophy squad. Youngest by 3 years. Locker 17, name on tape, air-conditioned room."
      - "Senior player watches Vipin bowl from TV — same man Vipin had observed on chai-stall screens. Now in adjacent locker."
      - "Hierarchy explained by Shukla: don't speak in meetings, don't give advice, field sub without complaint."
      - "Vipin must earn the right to be funny. New concept."
      - "First net session: Gokhale watches, says 'How old?' at 136 kph. Senior batsman teaches run-up acceleration: last four strides, maximum speed at delivery."
      - "Week two: Desai makes offhand comment — 'Rao saab ne kahin se utha ke le aaya.' Vipin's face empties."
      - "Vipin bowls at Desai's head. 136 kph. Professional duck. Ball thuds into fence. Session stops."
      - "Rao (not present, arrives later): 'You can't fight everyone who says something about where you come from. There aren't enough balls in the world.' Vipin: 'I only needed one.'"
      - "Desai never makes another comment. Rao doesn't call it a win."
      - "Substitute fielder in Ranji match — visibly bored at fine leg. Rao's coldest look. Shame immediate. Straightens up."
      - "Kedar (40, batting specialist) takes Vipin aside. Stories about Gavaskar and Sachin. 'The anger is a hammer. Everything you hit with it doesn't need a hammer.'"
      - "'When did you figure it out?' / 'Thirty-three. Two seasons before I retired.' Vipin has time. But not unlimited."
      - "Extra hour in nets — bowling not-angry. 128-132 kph controlled. Harder than bowling angry. That's the point."
      - "Mismatched gloves: collects 7 pairs of senior players' worn gloves. Left from one, right from another. Equipment manager mentions it. Vipin doesn't care."
      - "India wins T20 World Cup September 2007. Watches at Dadar chai stall. Second chai poured free. Squeezes rubber ball until fingers hurt."
      - "Rao calls: IPL auction announced. Mumbai Indians scout has watched footage. Three scouts total interested."
      - "Rao: 'Are you good enough?' / 'Yes. You are.' No qualification."
      - "U-19 match, October: mystery woman in plain cotton sari. Both days. Eye contact once — she looks away. Gone after match. Not at next match."
      - "Mumbai Indians scout Prashant watches two sessions. Makes calls. Base price recommendation: $60,000."
      - "Rao: 'Are you ready?' Vipin picks up bat, squeezes ball, walks to nets. That's the answer."
    state_changes:
      vipin:
        age: 17
        bowling_speed: "136 kph (Ranji squad practice). Acceleration being added."
        new_environment: "Ranji Trophy squad — senior cricket exposure"
        new_habit: "Mismatched gloves drawer — 7 pairs, worn leather fits better"
        ipl_registration: "Submitted. Base price $60,000. Three franchises interested."
        bhai_awareness: "Bhai doesn't know about IPL. The parting claim ('remember who was here') noted as ticking."
      unknown_woman:
        description: "Mid-fifties, plain cotton sari, no cricket-official affiliation. U-19 match, two days, October 2007. Eye contact once, looked away quickly. Gone after match."
        status: "UNRESOLVED. Second pendant-thread sighting (after well-dressed man at U-17 final)."
      desai:
        note: "Made careless comment about Vipin's origins. Received 136 kph near head. Never made another comment."
    threads_developed:
      - khadoos_internalized (DEVELOPING — Kedar's lesson: anger is a hammer, not all problems need a hammer)
      - ipl_incoming (PLANTED — auction imminent. Scouts watching. Number about to be attached to name.)
      - mystery_woman (SECOND SIGHTING — pattern building with well-dressed man from Ch7)
      - bhai_claim_awareness (NOTED — Vipin is aware the parting claim is out there. Doesn't act on it.)
      - senior_cricket_politics (INTRODUCED — hazing, hierarchy, earning the right to be present)
    anti_ai_markers_verified:
      strange_personal_detail: "Seven pairs of mismatched batting gloves from senior players. Left from one player, right from another. Worn leather fits better. Equipment manager disturbed. Vipin uninterested in his displeasure."
      imperfect_moment: "Slouching at fine leg during Ranji substitute fielding. Visibly bored. Rao's coldest look from boundary. Shame immediate, no fix possible in the moment."
      unresolved_micro: "Mystery woman in cotton sari at U-19 match. Both days. Eye contact once. Gone. Not at next match. Not explained. Filed under unresolved."
      grounding_physical: "Locker 17, name on new tape. Air conditioning. The specific way senior players unpacked first, occupied space with the authority of belonging. Vipin moves at the periphery."
    beta_score: 8
    inconsistencies_detected: none

  chapter-07:
    title: "Built Different"
    timeline: "2005-2006 (ages 15-16)"
    events:
      - "U-15 tournament: 487 runs (avg 81.1), 22 wickets. Tournament scorebook-keeper Gaitonde tells Rao: 'Better than Tendulkar's numbers at this age.'"
      - "MCA selectors want to fast-track. Patwardhan (rival coach, academy) dissents on documentation. Political threat confirmed."
      - "Vipin enters U-17 setup. Room goes quiet — scale, not intimidation. First reputation outside gully."
      - "Ravi names Vipin 'Chaudhary' in the dressing room: 'Bhai nahi, Chaudhary hai yeh.' Sticks immediately. Nobody uses 'Vipin' anymore."
      - "Nutritionist Bhatt notes: unusual protein conversion. Nobody follows up."
      - "Vegetarianism mocked at lunch. Vipin: 'You eat chicken and can't run two. I eat paneer and I can run twenty. Maybe the chicken is the problem.' Mocking stops."
      - "Calorie-counting habit established — reads nutritional info on all food packaging. Knows Parle-G is 449 cal/100g. Impresses nobody."
      - "Ravi-Vipin dynamic defined: Ravi names things aloud, Vipin responds with precision. Efficient system."
      - "Formal MCA inquiry. Committee review. Rao fights with paperwork, precedent, performance record."
      - "Official asks: 'Where are your parents, son?' — four-second silence. Then: 'If you find them, tell them I'm playing cricket.' Devastating and funny."
      - "Committee rules: can play, needs birth certificate within 6 months, formal guardianship."
      - "U-17 tournament. 84 off 52, five sixes — three off Patwardhan's bowler (targeted/not targeted)."
      - "Bowling at 133 kph. Opener retires hurt. Vipin doesn't apologize, doesn't celebrate."
      - "Second match: makes 12, rash slash shot, throws bat in dressing room. Ravi: 'Bat se problem kya hai?' Tension breaks with laughter."
      - "Tournament: 398 runs, 18 wickets, MVP. Patwardhan's political allies now lobbying for Vipin's selection."
      - "Mysterious well-dressed man in stands watching Vipin specifically. Leaves before presentations. Not a selector, coach, or parent. Filed: unresolved."
      - "Birth certificate application signed. DOB: June 15, 1990 (estimated). Father: Unknown. Mother: Unknown."
      - "Birth certificate arrives August 2006. Pale green paper. Vipin: 'At least they spelled Chaudhary right.' Flat voice."
      - "That night: pendant in hand, briefcase gone. Gap between gold pendant and green paper is the shape of a question."
    state_changes:
      vipin:
        age: 16
        bowling_speed: "133 kph (U-17 tournament, 2006)"
        team: "Mumbai U-17 (selected)"
        birth_certificate: "ISSUED August 2006 — pale green, Father: Unknown, Mother: Unknown, DOB: June 15 1990"
        known_as: "'Chaudhary' — surname as title. Used by entire team. Origin: Ravi Deshmukh."
        new_habits: ["reads nutritional info on all food packaging", "knows calorie counts without looking"]
        anger_note: "Plays best angry. Rao sees this and is worried — unsustainable resource."
        drawer_contents: "Birth certificate given to Rao for safekeeping"
      ravi_deshmukh:
        relationship_vipin: "Cemented as closest friend. Names things Vipin won't. Can break Vipin's silences."
        nickname_given: "'Chaudhary' — coined by Ravi, chapter 7. Permanent from this point."
      unknown_man_in_stands:
        description: "Well-dressed, ~180cm, late forties, dark jacket. East terrace, final match. Not cricket-affiliated. Left before presentations."
        status: "UNRESOLVED. Pendant mystery connection possible. Ambiguous deliberately."
    threads_developed:
      - chaudhary_title (ESTABLISHED — permanent identifier from this chapter forward)
      - anger_as_fuel (ESTABLISHED — Rao sees it as dangerous. Documented in his notebook.)
      - birth_certificate (RESOLVED — pale green paper, June 15 1990, Father/Mother Unknown)
      - unknown_man_pendant_mystery (PLANTED — ambiguous, filed as unresolved)
      - rao_projection (DEEPENED — thinks of own knee injury and anger when watching Vipin)
