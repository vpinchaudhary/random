        last_interaction: "26/11 vigil: called 12 times over 2 hours. Safe. Was asleep. Vipin realizes: doesn't have his address."
        knowledge_gap: "Vipin still doesn't know where the groundskeeper lives. 12 years of knowing someone, no address."
