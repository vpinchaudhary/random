  chapter-17:
    title: "The Girl in the Third Row"
    timeline: "Early-mid 2010 (age 20) — India debut, IPL S3, first meeting with Shraddha"
    events:
      - "India debut: T20I, Wankhede, February 2010. 28 off 19 balls (3 fours, 1 six). 1-31 off 3 overs. First over went for 12 (no-ball, full toss, short ball punished, then wicket on 4th delivery). Described by coaching staff as 'controlled.' Vipin says 'learning.'"
      - "Pendant touched in dressing room before walking out. Invisible under blue jersey."
      - "India cap weight: 'almost nothing.' Holds it for a moment. Mirror joke: 'Not bad for a guy with no birth certificate.' Mirror doesn't laugh."
      - "Groundskeeper watched with Rao at Shivaji Park — carried TV or adjusted position to get the channel. When Vipin's wicket fell, groundskeeper knocked once on chair arm. Rao looked at him. Groundskeeper shrugged. They continued watching."
      - "Rao morning after: 'Bowling was functional.' Length errors noted. 'The batting was good.' Cold chai forgotten = thinking = highest Rao compliment. Vipin went to get kit instead of saying 'I know' third time."
      - "IPL Season 3 sponsor party: Colaba five-star. Vipin in first-ever suit (navy blue, Hill Road tailor, too tight in shoulders for Jaat frame). Orbits edges. Counts: 19 tables × 9 + 23 standing ≈ 194 people."
      - "First sight of Shraddha Kapoor at party. Far window. Jeans, good top, earrings. The laugh: loud, catches herself, laughs again. Room-scanning habit noticed by Vipin — she reads rooms too. He's never seen anyone else do it. Loses her in 40 seconds of conversation he wasn't paying attention to."
      - "Charity dinner in Bandra (weeks later). Vipin tells training story at his table. Adjacent table laughs. Eyes meet with Shraddha."
      - "Ravi makes introduction: 'Shraddha Kapoor. Don't make a Gogo joke.' Vipin: 'I was going to make a Gogo *reference*. There's a difference.' Shraddha's laugh: genuine, surprised."
      - "First real conversation: 15 minutes. She knows about Malinga slower ball from a Cape Town interview. He asks about her film, she deflects, he: 'You were the only person in it who looked like a real human. That's not nothing.' She recalibrates — the honest compliment lands differently than expected."
      - "Batata vada conversation: oil temperature, water pressure theory. Paneer in five countries (India, SA, UAE, England). 'The English paneer was a mistake. I think they boiled it first. And then apologized.' Shraddha's full laugh, twice."
      - "VISIBLE HITCH: Shraddha talks about her mother teaching her batata vada (thumb motion). Vipin thinks about his mother — unknown, maybe that kind of woman or not. Half-second visible on his face. Shraddha notices. Doesn't push. Changes subject."
      - "Shraddha writes number on back of place card. 'Next time.' Vipin: 'Tell me more about the water pressure theory.' She leaves saying 'Next time.'"
      - "Ravi text: number, 'Don't be weird about it.' Vipin: 'I'm not weird.' Ravi: 'Your last four apologies all came out wrong. You ARE weird.'"
      - "Three days: doesn't call. Catastrophizing: Juhu bungalow vs. temple stairs pendant. 'No evidence for this belief and no intention of testing it.'"
      - "Shraddha texts first: Versova batata vada link. 'Owner is rude but food is genuine.' Vipin: 'Rude and genuine sounds like my career.' Laughing emojis exchanged. First emojis he's ever sent."
      - "Goes to drawer after text. Looks at photograph. Woman in photo is half-turned, laughing at something. Vipin notes: 'mid-motion, not posed... expression of someone surprised into amusement.' Puts it back. Doesn't know what the two things have to do with each other."
    state_changes:
