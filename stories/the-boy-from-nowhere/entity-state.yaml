  chapter-11:
    title: "The Dressing Room"
    timeline: "Early March 2008 — MI pre-season camp, Taj Hotel"
    events:
      - "Taj Hotel: wrong shower knob → cold blast → slides into glass door → laughs alone. First real laugh in the hotel."
      - "Room inventory: 32-button TV remote (uses 4), safe set to code 23 (River crack), minibar closed (juice = 400 rupees). Hotel soap: odorless, white. Registers pink temple soap absence."
      - "Team meeting: Sachin (shorter than expected, just sitting), Harbhajan (louder/warmer than TV), Malinga (quiet, focused stillness), Pollock (still taking notes at 34), Suresh from Karnataka (also new, over-friendly)."
      - "Sachin nods at Vipin. Two seconds of paralysis. World resumes."
      - "Ice-breaker: 'I'm vegetarian so your chicken is safe.' Harbhajan laughs loudest. Malinga's mouth corner. Sachin's mouth corner. Filed."
      - "Reads nutrition document under table during budget presentation."
      - "Nets: 134→137→139 kph bowling. Dalvi (bowling coach) makes notes without speaking. Throwdown at 144-148 kph: 8 consecutive drives to same spot. Net has a dent. Dalvi makes more notes."
      - "Sachin watches last 3 balls from adjacent net. 'Good hands, young man.' Four words. Keeps walking."
      - "Lunch: MI practice ball rolls by, pockets it. Into kit bag when nobody looking."
      - "Team dinner: vegetarian buffet, loads two plates by instinct, catches himself at second plate, eats slowly, leaves rice deliberately. Nobody notices."
      - "Fenugreek in saag → pandit's cooking. Sets observation aside."
      - "Calls Rao: 'Sachin said I have good hands.' Rao: 'He's right. You do.' Then: 'Good.' The weight in that word."
      - "Pendant: thinks about whether she (biological mother) might know. Files in unactionable."
      - "Sleeps on top of covers, fully dressed. Room too much. Notes 48 ceiling tiles."
      - "Plans to ask for 150 from Jadhav tomorrow."
    state_changes:
