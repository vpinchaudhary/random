    title: "Built Different"
    timeline: "2005-2006 (ages 15-16)"
    events:
      - "U-15 tournament: 487 runs (avg 81.1), 22 wickets. Tournament scorebook-keeper Gaitonde tells Rao: 'Better than Tendulkar's numbers at this age.'"
      - "MCA selectors want to fast-track. Patwardhan (rival coach, academy) dissents on documentation. Political threat confirmed."
      - "Vipin enters U-17 setup. Room goes quiet — scale, not intimidation. First reputation outside gully."
      - "Ravi names Vipin 'Chaudhary' in the dressing room: 'Bhai nahi, Chaudhary hai yeh.' Sticks immediately. Nobody uses 'Vipin' anymore."
      - "Nutritionist Bhatt notes: unusual protein conversion. Nobody follows up."
      - "Vegetarianism mocked at lunch. Vipin: 'You eat chicken and can't run two. I eat paneer and I can run twenty. Maybe the chicken is the problem.' Mocking stops."
      - "Calorie-counting habit established — reads nutritional info on all food packaging. Knows Parle-G is 449 cal/100g. Impresses nobody."
      - "Ravi-Vipin dynamic defined: Ravi names things aloud, Vipin responds with precision. Efficient system."
      - "Formal MCA inquiry. Committee review. Rao fights with paperwork, precedent, performance record."
      - "Official asks: 'Where are your parents, son?' — four-second silence. Then: 'If you find them, tell them I'm playing cricket.' Devastating and funny."
      - "Committee rules: can play, needs birth certificate within 6 months, formal guardianship."
      - "U-17 tournament. 84 off 52, five sixes — three off Patwardhan's bowler (targeted/not targeted)."
      - "Bowling at 133 kph. Opener retires hurt. Vipin doesn't apologize, doesn't celebrate."
      - "Second match: makes 12, rash slash shot, throws bat in dressing room. Ravi: 'Bat se problem kya hai?' Tension breaks with laughter."
      - "Tournament: 398 runs, 18 wickets, MVP. Patwardhan's political allies now lobbying for Vipin's selection."
      - "Mysterious well-dressed man in stands watching Vipin specifically. Leaves before presentations. Not a selector, coach, or parent. Filed: unresolved."
      - "Birth certificate application signed. DOB: June 15, 1990 (estimated). Father: Unknown. Mother: Unknown."
      - "Birth certificate arrives August 2006. Pale green paper. Vipin: 'At least they spelled Chaudhary right.' Flat voice."
      - "That night: pendant in hand, briefcase gone. Gap between gold pendant and green paper is the shape of a question."
