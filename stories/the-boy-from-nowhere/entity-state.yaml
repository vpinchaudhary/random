        emotional_state: "26/11 processed in solitude. Catastrophizing absorbed into facts. City-belonging deepened."
        pendant_note: "Cut palm during vigil. Chain in neck. The pendant left its mark on him — noted."
        pandit_connection: "Donation in pandit's name: Shastri Venkataraman. Most temple-kid thing since leaving temple."
        donation: "Anonymous. Significant. IPL earnings. Won't be known."
        knowledge_gained: "Now knows difference between surviving a city and belonging to it."
