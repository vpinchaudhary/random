  chapter-06:
    title: "The Boy with No File"
    timeline: "2004-2005 (ages 14-15)"
    events:
      - "MCA office visit with Rao — Vipin counts 231-235 files while Rao navigates paperwork."
      - "Statutory declaration processed. Father: Unknown. Mother: Unknown. DOB estimated June 15 1990."
      - "St. Xavier's principal Nair backdates enrollment. Club address listed as residential."
      - "Rao signs as guardian without discussion. Neither of them names what this means."
      - "Vipin understands the grey track: systems run on gaps, gaps are where people like him live."
      - "District trials at Matunga ground. 60 boys, all with academy logos. Vipin arrives with plain shirt."
      - "Ravi Deshmukh introduced — quick face, first meeting. 'Nice pads. Do they come in men's size?' Kid laughs despite himself."
      - "Batting assessment: blocks first two (discipline visible), then dispatches six consecutive at 125 kph. Selector puts down chai."
      - "Bowling assessment: 128 kph. Speed gun operator looks twice. One delivery kicks off length, another comes back in — wicket."
      - "Fielding: untouchable. Left-handed catch mid-stride. Ravi watches, shakes head."
      - "Trial match: Vipin bats at 5, team 45/4. Scores 67 off 41 balls. Straight six stops adjacent trial."
      - "Lunch confrontation: selector asks about academy. Vipin's humor doesn't load. Four-second silence. Man blinks first. Rao: 'Don't make enemies of people who sign the team sheet.'"
      - "Selected for Mumbai U-15. Letter addressed to St. Xavier's."
      - "Vipin reads own name on official document: VIPIN CHAUDHARY. Touches pendant."
      - "MCA registration number memorized: MCA/U15/2005/0387. Filed as proof of existence. Will remember for life."
      - "First match in whites, Pune. 43 runs, rash pull shot, punches pad walking off. 3 wickets including instinctive yorker (stumps cartwheel)."
      - "Post-match snacks — first real team experience. Deflects all personal questions with humor. Works perfectly."
      - "Ravi sits next to him. Talks about cricket, not family. They discuss pull shots and cut shots and seam position. An hour passes without threat assessment."
      - "Opposition coach approaches Rao after match — gestures at Vipin, shakes head (recalibration, not disapproval). Rao goes flat. Neither discusses it."
    state_changes:
