  chapter-16:
    title: "Foreign Soil"
    timeline: "April–May 2009 (age 18-19) — IPL Season 2, South Africa"
    events:
      - "First passport: fast-tracked by MI management. Passport office ceiling tiles: 22."
      - "First international flight: Emirates EK512, Mumbai to Johannesburg, April 9, 2009, 03:55. Business class. Window seat. India disappears below clouds over Arabian Sea. Watched MasterChef Australia on in-flight entertainment."
      - "Johannesburg: cold. Hotel Marriott, 14th floor. City lights too many to count (gave up). Ordered vegetarian room service. Bread 'not vetkoek but acceptable.'"
      - "Training: Highveld altitude (1,753m), bouncier pitches, ball carries further. Adapted in 12 deliveries. Bowling coach Kulkarni notes this."
      - "Can see cricket ball seam from top of run-up in SA light (sharper, harder shadows, deeper blue). Told Kulkarni. Kulkarni took notes secretly. '6 balls from top of run-up — 3 hit top of off stump, 2 full tosses, 1 best delivery of season (leg-cutter, bail shattered).'"
      - "South Africa: nobody knows the orphan narrative. No Anjali article readers here. Shoulder drop noticed in training photos by Vipin. Jokes landed differently — just laughs, not laughs-plus-meaning. Filed this without analyzing it."
      - "IPL Season 2 performance: 11 matches, 312 runs, 14 wickets. 'Three balls ahead of his plan' per SA commentator."
      - "Braai at Sandton with team. Corné van der Berg (SA overseas player, WC pace, 148 kph domestic) — vegetarian paneer joke. Talked for 2 hours about pace and reverse swing. No orphan narrative required."
      - "Malinga slower-ball lesson: 'Come.' Showed the grip. 40% slower (not 20 — 20% they adjust to). Shoulder tell problem fixed by Vipin in 12 balls. Used variation against Dhoni in CSK match — Dhoni missed by half a meter. Not out but first time Vipin made Dhoni miss. 'Things that require more practice.'"
      - "Analyst (Rajesh, 23) incident: Vipin snapped at him after Delhi loss. 'I know what I did. I was there.' Rajesh retreated. Ravi called from Pune: 'Analysts se ladna band kar.' Vipin apologized to Rajesh next morning — awkward, wrong rhythm, but done. Watched the video. Analysis was correct."
      - "Selector watched 3-22 spell vs CSK. Three questions about leg-cutter. Kulkarni said: 'Focus on the full tosses.' Rao call: 'I know. Keep doing what you're doing.' Vipin's 'What if—' cut off by Rao's repetition."
      - "India cap NOT said aloud — the words would make it real. 'Making it real before it was real was the method he used to not have things.' Said it once on the plane home, closed the thought like a drawer."
      - "Return flight: coastline appears. Recognition, not nostalgia. Dharavi from descent — 'he had slept in those streets.' World's size not news but evidence different."
      - "Shivaji Park: Rao Q&A — full tosses, Delhi dismissal, pitch adjustment. 'You're always knowing things. This time, do them.' Closest Rao gets to 'welcome back.'"
      - "Drawer update: match ball (3-22 spell), team photo (back row, tallest, not smiling), Emirates boarding pass. Museum now has international exhibits."
      - "PHOTOGRAPH: plain envelope, no return address, handwriting unknown. Inside: black-and-white photo of young couple (20s-25s) outside institutional building. Man has broad shoulders, jaw 'carved for taking hits.' Woman half-turned, laughing. Back: NOTHING. No name, no date. Hand shook for 10 minutes (counted seconds between shakes). Didn't call Rao. Didn't call Ravi. Put in drawer on top of boarding pass."
    state_changes:
