    events:
      - "Vipin moves into first personal flat: Dadar, 11-bedroom, ~400 sq ft furnished. Never cooked. Fills four hundred of eleven hundred square feet. Counted ceiling tiles: 47."
      - "Off-season: Ranji Trophy regular squad. Bats at 6, bowls first change. Conversion problem: gets to 38-41 but can't convert to 50. Rao diagnosis: 'Your impatience is faster than the ball.'"
      - "India selection drumbeat: name in cricket columns as 'fringe player who could force his way in.' BCCI medical team contacted twice. Doesn't say India aloud — afraid of claiming it."
      - "Strange personal detail: watches MasterChef Australia on Tuesday and Thursday evenings. Never cooks. Finds precision of measurements calming. Has opinions about vegetarian options in cooking competitions that he never shares."
      - "November 26, 2008: Ravi calls from Bangalore. 'Turn on. The news.' Mumbai attacks begin. CST, Taj, Leopold, Nariman House, Oberoi, Cama Hospital. Vipin watches through the night alone."
      - "Memory trigger: CST wide shot on TV → sleeping on Platform 2 at age 11, chai stall owner who gave free chai without asking why."
      - "Counting during crisis: tracks news ticker items obsessively. 8 items per cycle, then 6, then 9 (confirmed vs. unconfirmed). Counted 11 cycles before noticing. Stopped. Started again without deciding to."
      - "Called Rao (safe). Called groundskeeper — 12 rings, no answer, called every 20 mins for 2 hours. Groundskeeper was asleep. Safe but unreachable. Vipin panics privately."
      - "Thought about calling Bhai. Did not call. Bhai's territory far from attacks. No useful call to be made. Filed without acting."
      - "Pendant: gripped until chain dug into neck. Pendant edge cut thin line across palm. Not deep. Noticed it at some point."
      - "Unsent text to teammate: 'Don't pray. Show up.' Typed it. Looked at it 4 seconds. Deleted. Sent: 'Thanks, bhai.' Rage at performance of grief — contained."
      - "Three-day vigil: TV in dark flat. Ate once on 26th, not at all 27th. Ravi called twice a day, both saying approximately nothing but staying on line."
      - "Rao second-day call: 'They were guests. The city let them in.' / 'Make it a fortress. It stops being Mumbai.' (Left unfinished.) Vipin: 'It was always going to happen. The city is open because it has to be.' Cricket talk for 40 minutes afterward — using the language they had."
      - "November 29: attacks end. 166 dead. Vipin slept 12 hours."
      - "Shivaji Park aftermath: Rao at nets. India announcement = January. 'Your grip. Change it.' / 'I will.' Rao's cold chai forgotten during Vipin watching — equivalent of a compliment."
      - "Reporter quote request: 'Mumbai's cricketers react to 26/11.' Vipin: 'Mumbai is strong. We'll get through this.' Published, forgotten in a week."
      - "What he didn't say: the 'spirit of Mumbai' critique — continuation vs. resilience. The difference between resilience (choice implied) and not-dying (no choice). Didn't say it because context requires the orphan narrative. Keeps it private."
      - "Anonymous donation to 26/11 victims fund: significant amount (large portion of IPL earnings). Name field: Shastri Venkataraman (the pandit's full name). No trace back to Vipin. Pandit's values enacted through cricket money."
      - "Ravi call: IPL Season 2 moving to South Africa. April. Neither has been outside India. 'Should be interesting.'"
      - "Final exchange: Vipin almost says something real to Ravi about belonging to the city now. Says 'Nothing' instead. Ravi says 'Yeah.' They talk about cricket for 40 minutes."
    state_changes:
      vipin:
        location: "Dadar flat (personal, first owned space)"
        age: 18
        new_living_situation: "First personal flat. 1100 sq ft, furnishing minimal. 47 ceiling tiles."
        ranji_status: "Regular squad member. Conversion problem at 38-41 being worked on with Rao."
